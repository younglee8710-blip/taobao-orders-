<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>采购订单汇总</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #fff; color: #1d1d1f; }
        .login-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-box h2 { margin-bottom: 20px; color: #333; }
        .login-box input { padding: 12px 20px; font-size: 16px; border: 2px solid #ddd; border-radius: 10px; width: 200px; margin-bottom: 15px; }
        .login-box button { padding: 12px 30px; font-size: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; cursor: pointer; }
        .login-box button:hover { opacity: 0.9; }
        .login-error { color: #e74c3c; margin-top: 10px; display: none; }
        nav { background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); position: fixed; top: 0; left: 0; right: 0; height: 48px; display: flex; align-items: center; justify-content: center; z-index: 1000; border-bottom: 1px solid #d2d2d7; }
        nav span { font-size: 17px; font-weight: 600; }
        main { padding-top: 88px; max-width: 1400px; margin: 0 auto; padding-left: 40px; padding-right: 40px; }
        .hero { text-align: center; padding: 60px 0 40px; }
        .hero h1 { font-size: 36px; font-weight: 700; margin-bottom: 8px; }
        .hero p { font-size: 17px; color: #86868b; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 40px; }
        .stat-card { background: #f5f5f7; border-radius: 16px; padding: 24px; text-align: center; }
        .stat-label { font-size: 12px; color: #86868b; margin-bottom: 6px; }
        .stat-value { font-size: 28px; font-weight: 600; color: #1d1d1f; }
        .stat-value.blue { color: #007aff; }
        .section-title { font-size: 21px; font-weight: 600; margin-bottom: 16px; }
        .buyer-card { background: #f5f5f7; border-radius: 20px; margin-bottom: 16px; overflow: hidden; }
        .buyer-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; cursor: pointer; border-bottom: 1px solid #d2d2d7; }
        .buyer-info { display: flex; align-items: center; gap: 12px; }
        .buyer-avatar { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; font-weight: 600; }
        .buyer-name { font-size: 16px; font-weight: 600; }
        .buyer-stats { display: flex; gap: 24px; }
        .buyer-stat { text-align: right; }
        .buyer-stat .val { font-size: 15px; font-weight: 600; }
        .buyer-stat .key { font-size: 11px; color: #86868b; }
        .expand-icon { font-size: 18px; color: #86868b; transition: transform 0.3s; margin-left: 16px; }
        .buyer-items { display: none; padding: 0 24px 16px; }
        .order-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .order-table th { text-align: left; padding: 12px 8px; font-size: 11px; font-weight: 500; color: #86868b; text-transform: uppercase; border-bottom: 1px solid #d2d2d7; }
        .order-table td { padding: 14px 8px; border-bottom: 1px solid #eee; vertical-align: top; }
        .order-table tr:last-child td { border-bottom: none; }
        .order-table .date { white-space: nowrap; color: #86868b; width: 75px; }
        .order-table .express { font-family: monospace; font-size: 12px; color: #007aff; width: 115px; }
        .order-table .product { line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .order-table .qty { width: 40px; text-align: center; }
        .order-table .unit { width: 55px; text-align: right; color: #666; }
        .order-table .price { width: 60px; text-align: right; font-weight: 600; }
        .order-table .invoice { color: #86868b; width: 100px; }
        .order-table .order-id { font-family: monospace; font-size: 11px; color: #aaa; width: 120px; }
        .order-table .address { font-size: 11px; color: #999; width: 130px; }
        footer { text-align: center; padding: 32px; color: #86868b; font-size: 12px; border-top: 1px solid #d2d2d7; }
    </style>
</head>
<body>
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>请输入访问密码</h2>
            <input type="password" id="passwordInput" placeholder="密码" onkeypress="if(event.key==='Enter')checkPassword()">
            <br>
            <button onclick="checkPassword()">进入</button>
            <p class="login-error" id="loginError">密码错误</p>
        </div>
    </div>
    <script>
        const CORRECT_PASSWORD = "123456";
        function checkPassword() {
            var pwd = document.getElementById("passwordInput").value;
            if (pwd === CORRECT_PASSWORD) {
                document.getElementById("loginOverlay").style.display = "none";
            } else {
                document.getElementById("loginError").style.display = "block";
                document.getElementById("passwordInput").value = "";
            }
        }
    </script>
    <nav><span>采购订单汇总</span></nav>
    <main>
        <div class="hero">
            <h1>采购订单总结</h1>
            <p>2026年04月05日</p>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">采购金额总计</div><div class="stat-value blue">¥0.00</div></div>
            <div class="stat-card"><div class="stat-label">采购品类</div><div class="stat-value">0</div></div>
            <div class="stat-card"><div class="stat-label">采购批次</div><div class="stat-value">0</div></div>
        </div>
        <h2 class="section-title">采购明细</h2>
</main>
<footer>
    <p>采购订单汇总系统</p>
    <button onclick="deleteAllOrders()" style="margin-top: 20px; padding: 10px 20px; background: #ff3b30; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;">🗑️ 清空所有订单</button>
</footer>
<script>
function toggleItems(header) {
    const items = header.nextElementSibling;
    const icon = header.querySelector('.expand-icon');
    if (items.style.display === 'none' || items.style.display === '') {
        items.style.display = 'block';
        icon.style.transform = 'rotate(90deg)';
    } else {
        items.style.display = 'none';
        icon.style.transform = '';
    }
}

function deleteAllOrders() {
    if (confirm('确定要清空所有订单吗？此操作不可恢复！')) {
        if (confirm('再次确认：真的要删除所有订单吗？')) {
            alert('订单已清空！请通知Claude Code重新生成网页。');
            location.reload();
        }
    }
}
</script>
</body></html>
