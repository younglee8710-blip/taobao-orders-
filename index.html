<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>采购订单汇总</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif; background: #fff; color: #1d1d1f; -webkit-font-smoothing: antialiased; }

        /* Password overlay - Apple style */
        .login-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #f5f5f7; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 48px; border-radius: 18px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; min-width: 320px; }
        .login-box h2 { font-size: 24px; font-weight: 600; margin-bottom: 8px; color: #1d1d1f; }
        .login-box p { font-size: 14px; color: #86868b; margin-bottom: 24px; }
        .login-box input { width: 100%; padding: 14px 16px; font-size: 17px; border: 1px solid #d2d2d7; border-radius: 12px; margin-bottom: 16px; outline: none; transition: border-color 0.2s; }
        .login-box input:focus { border-color: #007aff; }
        .login-box button { width: 100%; padding: 14px; font-size: 17px; font-weight: 500; background: #007aff; color: white; border: none; border-radius: 12px; cursor: pointer; transition: background 0.2s; }
        .login-box button:hover { background: #0051d5; }
        .login-error { color: #ff3b30; font-size: 14px; margin-top: 12px; display: none; }

        nav { background: rgba(255,255,255,0.8); backdrop-filter: saturate(180%) blur(20px); position: fixed; top: 0; left: 0; right: 0; height: 48px; display: flex; align-items: center; justify-content: center; z-index: 1000; border-bottom: 1px solid #d2d2d7; }
        nav span { font-size: 17px; font-weight: 600; letter-spacing: -0.022em; }
        main { padding-top: 88px; max-width: 1400px; margin: 0 auto; padding-left: 40px; padding-right: 40px; }
        .hero { text-align: center; padding: 60px 0 40px; }
        .hero h1 { font-size: 48px; font-weight: 700; letter-spacing: -0.003em; margin-bottom: 8px; color: #1d1d1f; }
        .hero p { font-size: 21px; color: #86868b; font-weight: 400; }
        .section-title { font-size: 24px; font-weight: 600; letter-spacing: -0.003em; margin-bottom: 20px; color: #1d1d1f; }
        .buyer-card { background: #f5f5f7; border-radius: 18px; margin-bottom: 16px; overflow: hidden; }
        .buyer-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; cursor: pointer; border-bottom: 1px solid #e5e5e7; }
        .buyer-info { display: flex; align-items: center; gap: 12px; }
        .buyer-avatar { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; font-weight: 600; }
        .buyer-name { font-size: 17px; font-weight: 600; }
        .buyer-stats { display: flex; gap: 32px; }
        .buyer-stat { text-align: right; }
        .buyer-stat .val { font-size: 17px; font-weight: 600; color: #1d1d1f; }
        .buyer-stat .key { font-size: 12px; color: #86868b; }
        .expand-icon { font-size: 20px; color: #86868b; transition: transform 0.3s ease; margin-left: 16px; }
        .buyer-items { display: none; padding: 0 24px 20px; }
        .order-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .order-table th { text-align: left; padding: 12px 8px; font-size: 12px; font-weight: 500; color: #86868b; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid #d2d2d7; }
        .order-table td { padding: 14px 8px; border-bottom: 1px solid #e5e5e7; vertical-align: top; }
        .order-table tr:last-child td { border-bottom: none; }
        .order-table .date { white-space: nowrap; color: #86868b; width: 85px; }
        .order-table .express { font-family: monospace; font-size: 13px; color: #007aff; width: 120px; }
        .order-table .product { line-height: 1.4; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .order-table .qty { width: 50px; text-align: center; }
        .order-table .unit { width: 70px; text-align: right; color: #666; }
        .order-table .price { width: 80px; text-align: right; font-weight: 600; color: #1d1d1f; }
        .order-table .invoice { color: #86868b; width: 120px; }
        .order-table .order-id { font-family: monospace; font-size: 12px; color: #86868b; width: 130px; }
        .order-table .address { font-size: 12px; color: #86868b; width: 150px; }
        footer { text-align: center; padding: 40px; color: #86868b; font-size: 14px; border-top: 1px solid #d2d2d7; margin-top: 60px; }
        .delete-btn { margin-top: 20px; padding: 12px 24px; background: #f5f5f7; color: #86868b; border: 1px solid #d2d2d7; border-radius: 12px; cursor: pointer; font-size: 15px; font-weight: 500; transition: all 0.2s; }
        .delete-btn:hover { background: #e5e5e7; color: #1d1d1f; }
        @media (max-width: 768px) {
            .hero h1 { font-size: 36px; }
            .buyer-stats { display: none; }
        }
    </style>
</head>
<body>
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>采购订单汇总</h2>
            <p>请输入访问密码</p>
            <input type="password" id="passwordInput" placeholder="密码" onkeypress="if(event.key==='Enter')checkPassword()">
            <button onclick="checkPassword()">继续</button>
            <p class="login-error" id="loginError">密码错误，请重试</p>
        </div>
    </div>
    <script>
        const CORRECT_PASSWORD = "youngstore";
        function checkPassword() {
            var pwd = document.getElementById("passwordInput").value;
            if (pwd === CORRECT_PASSWORD) {
                document.getElementById("loginOverlay").style.display = "none";
            } else {
                document.getElementById("loginError").style.display = "block";
                document.getElementById("passwordInput").value = "";
            }
        }
    </script>
    <nav><span>采购订单汇总</span></nav>
    <main>
        <div class="hero">
            <h1>采购订单</h1>
            <p>2026年04月05日</p>
        </div>
        <h2 class="section-title">订单明细</h2>
</main>
<footer>
    <p>采购订单汇总系统</p>
    <button class="delete-btn" onclick="deleteAllOrders()">清空所有订单</button>
</footer>
<script>
function toggleItems(header) {
    const items = header.nextElementSibling;
    const icon = header.querySelector('.expand-icon');
    if (items.style.display === 'none' || items.style.display === '') {
        items.style.display = 'block';
        icon.style.transform = 'rotate(90deg)';
    } else {
        items.style.display = 'none';
        icon.style.transform = '';
    }
}

function deleteAllOrders() {
    if (confirm('确定要清空所有订单吗？此操作不可恢复！')) {
        if (confirm('再次确认：真的要删除所有订单吗？')) {
            alert('订单已清空！请通知Claude Code重新生成网页。');
            location.reload();
        }
    }
}
</script>
</body></html>
